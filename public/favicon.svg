<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="100%" height="100%">
  <defs>
    <linearGradient id="brand-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" class="gradient-start" />
      <stop offset="100%" class="gradient-end" />
    </linearGradient>
  </defs>

  <style>
    /* --- Brand Design System (Default Light Mode) --- */
    .gradient-start {
      stop-color: #006e1a; /* var(--color-primary) */
    }
    .gradient-end {
      stop-color: #57ec5e; /* var(--color-accent) */
    }
    .text-monogram {
      fill: #f2f4f3;       /* var(--color-background) */
      font-family: "Inter Custom", system-ui, -apple-system, sans-serif;
      font-weight: 800;
      font-size: 13px;
      letter-spacing: -0.5px;
    }

    /* --- Dark Mode System Adaptability --- */
    @media (prefers-color-scheme: dark) {
      .gradient-start {
        stop-color: #8ae68e; /* var(--color-secondary) for higher contrast */
      }
      .gradient-end {
        stop-color: #006e1a; /* var(--color-primary) */
      }
      .text-monogram {
        fill: #070b07;     /* var(--color-font) for better readability on light gradient */
      }
    }
  </style>

  <rect x="2" y="2" width="28" height="28" rx="9" fill="url(#brand-gradient)" />

  <text x="16" y="20.5" class="text-monogram" text-anchor="middle">YK</text>
</svg>
