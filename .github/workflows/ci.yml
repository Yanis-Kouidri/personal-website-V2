name: CI/CD Pipeline

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - ".gitignore"
      - "docs/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "README.md"
      - ".gitignore"
      - "docs/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting with Prettier
        run: bun run check

      - name: Check Typescript
        run: bun run typecheck

  build-and-push:
    name: Build and push Podman image
    needs: quality-check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Extract metadata (version & image name)
        id: meta
        run: |
          VERSION=$(jq -r .version package.json)
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO_NAME_LC=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/$OWNER_LC/$REPO_NAME_LC" >> "$GITHUB_OUTPUT"

      - name: Connect to GitHub Container Registry
        uses: redhat-actions/podman-login@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build podman image
        id: build-image
        uses: redhat-actions/buildah-build@v2
        with:
          image: ${{ steps.meta.outputs.image }}
          context: .
          platforms: linux/amd64
          tags: |
            latest
            ${{ steps.meta.outputs.version }}
            sha-${{ github.sha }}
          containerfiles: |
            ./Containerfile

      - name: Push to GHCR
        if: github.event_name == 'push'
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ steps.build-image.outputs.image }}
          tags: ${{ steps.build-image.outputs.tags }}
          registry: ghcr.io

      - name: Verify build status
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            echo "Image built and pushed on GHCR."
            echo "Image pushed:"
            echo "${{ steps.meta.outputs.image }}:latest"
            echo "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}"
            echo "${{ steps.meta.outputs.image }}:sha-${{ github.sha }}"
          else
            echo "Image built but not pushed (tests PR)"
          fi
